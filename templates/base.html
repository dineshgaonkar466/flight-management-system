<!DOCTYPE html>
<html>

<head>

    <title>Airline Reservation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #eef4fb;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #222;
            margin: 0;
            padding: 0;
        }

        /* NAVBAR */

        .navbar {
            background: white !important;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 20px;
        }

        .navbar-brand {
            font-size: 30px;
            font-weight: bold;
            color: #0077cc !important;
        }

        .nav-link {
            color: #222 !important;
            font-size: 17px;
            margin-left: 12px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .nav-link:hover {
            color: #0077cc !important;
        }

        /* CONTAINER */

        .container {
            padding-top: 25px;
            padding-bottom: 30px;
        }

        /* CARDS */

        .card {
            border-radius: 20px;
            transition: 0.3s ease;
            background: white;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* BUTTONS */

        .btn-primary {
            background-color: #0077cc;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 10px 18px;
        }

        .btn-primary:hover {
            background-color: #005fa3;
        }

        .btn-warning {
            border-radius: 10px;
            font-weight: 600;
            padding: 10px 18px;
        }

        /* HERO SECTION */

        .hero-section {
            height: 65vh;
            margin-top: -25px;
            padding-top: 120px;
            border-radius: 0 0 30px 30px;
            overflow: hidden;
        }

        /* ALERT */

        .alert-success {
            border-radius: 12px;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-light">

        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                ✈ FlightBooking
            </a>

            <div class="collapse navbar-collapse">

                <ul class="navbar-nav ms-auto">

                    {% if user.is_authenticated %}

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'dashboard' %}">
                                Dashboard
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'my_bookings' %}">
                                My Bookings
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">
                                Logout
                            </a>
                        </li>

                    {% else %}

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">
                                Login
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'register' %}">
                                Register
                            </a>
                        </li>

                    {% endif %}

                </ul>

            </div>

        </div>

    </nav>

    <!-- MAIN CONTENT -->

    <div class="container mt-4">

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-success alert-dismissible fade show"
                     role="alert">

                    {{ message }}

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                    </button>

                </div>

            {% endfor %}

        {% endif %}

        {% block content %}

        {% endblock %}

    </div>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
