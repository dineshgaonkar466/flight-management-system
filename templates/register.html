{% extends 'base.html' %}
{% block content %}

<div class="container mt-5" style="max-width: 500px;">

```
<h2 class="mb-4 text-center fw-bold">✈ User Registration</h2>

<div id="alertBox"></div>

<form method="POST" onsubmit="return validateForm();">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" id="id_username" name="username" class="form-control" placeholder="Enter username">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Email</label>
        <input type="email" id="id_email" name="email" class="form-control" placeholder="Enter email">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Password</label>
        <input type="password" id="id_password1" name="password" class="form-control" placeholder="Enter password">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Confirm Password</label>
        <input type="password" id="id_password2" class="form-control" placeholder="Confirm password">
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-bold mt-3">
        Register
    </button>

</form>
```

</div>

<script>
function validateForm() {

    const username = document.getElementById("id_username").value.trim();
    const email = document.getElementById("id_email").value.trim();
    const password1 = document.getElementById("id_password1").value;
    const password2 = document.getElementById("id_password2").value;

    let message = "";

    if (!username || !email || !password1 || !password2) {
        message = "All fields are required.";
    } 
    else if (password1 !== password2) {
        message = "Passwords do not match.";
    }

    if (message) {
        document.getElementById("alertBox").innerHTML = `
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        return false;
    }

    return true;
}
</script>

{% endblock %}
