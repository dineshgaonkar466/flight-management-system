{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mt-4 mb-3">Select Your Seat ✈️</h2>

<p class="text-center">
    Selected Seats: <span id="count">0</span>
</p>

<form method="POST">
    {% csrf_token %}

    <div class="seat-layout">

        {% for seat in seats %}

            {% if forloop.counter0|divisibleby:4 %}
                <div class="aisle"></div>
            {% endif %}

            <label>

                <input type="checkbox"
                       name="seats"
                       value="{{ seat.id }}"
                       {% if seat.is_booked %}disabled{% endif %}
                       onclick="updateCount()">

                <div class="seat
                    {% if seat.is_booked %}
                        booked
                    {% else %}
                        available
                    {% endif %}">

                    {{ seat.seat_number }}

                </div>

            </label>

        {% endfor %}

    </div>

    <div class="text-center mt-4">
        <button class="btn btn-success px-5">
            Confirm Booking
        </button>
    </div>

</form>

<style>
/* Layout */
.seat-layout{
    display:grid;
    grid-template-columns: repeat(5, 70px);
    gap:15px;
    justify-content:center;
    margin-top:40px;
}

/* Aisle gap */
.aisle{
    width:30px;
}

/* Seat base */
.seat{
    width:70px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;

    /* ✨ premium glass effect */
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.2);
}

/* 🔵 Available (Premium Blue Gradient) */
.available{
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color:white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Hover effect */
.available:hover{
    transform: scale(1.1);
    background: linear-gradient(135deg, #43e97b, #38f9d7);
}

/* ⚫ Booked (Dark Premium) */
.booked{
    background: linear-gradient(135deg, #434343, #000000);
    color:#aaa;
    cursor:not-allowed;
}

/* 🟡 Selected (Gold Glow) */
input:checked + .seat{
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color:black;
    transform: scale(1.15);
    box-shadow: 0 0 15px rgba(255, 200, 0, 0.8);
}

/* Hide checkbox */
input{
    display:none;
}
</style>

<script>
function updateCount(){
    let count = document.querySelectorAll('input:checked').length;
    document.getElementById('count').innerText = count;
}
</script>

{% endblock %}
